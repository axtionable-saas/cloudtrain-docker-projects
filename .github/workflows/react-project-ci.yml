name: React Project

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: react-project
  ECR_REGISTRY: 485031388770.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login To AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag and Push Docker Image
        working-directory: ${{ env.ECR_REPOSITORY }}
        run: |
          docker build -t $ECR_REPOSITORY:latest .
          docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-app:
    name: Deplpoying app on ECS Cluster
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploying to ECS Cluster
        run: |
          echo "Deploying Stage UAT"
          aws ecs update-service --cluster remarkable-dog-rqelfv --service react-project-service-i1v6jzf6 --force-new-deployment
          aws ecs wait services-stable --cluster remarkable-dog-rqelfv --service react-project-service-i1v6jzf6
